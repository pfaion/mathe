<!DOCTYPE html>
<html>
<head>
    <title>Mathe Training</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #f8f9fa 0%, #e9ecef 100%);
            display: grid;
            place-items: center;
        }

        .trainer-card {
            max-width: 540px;
            width: 100%;
            border: 0;
            border-radius: 1rem;
        }

        .question-wrap {
            min-height: 84px;
            display: grid;
            place-items: center;
            background-color: #f8f9fa;
            border-radius: 0.75rem;
            border: 1px solid #dee2e6;
        }

        .question-wrap math {
            font-size: clamp(1.9rem, 8vw, 2.4rem);
        }

        .status {
            min-height: 58px;
            margin-bottom: 0;
        }

        .action-btn {
            min-height: 52px;
            font-weight: 600;
        }

        @media (max-width: 576px) {
            .card-body {
                padding: 1.25rem !important;
            }

            .status {
                min-height: 68px;
            }
        }
    </style>
    <script>
        const state = {
            a: 0,
            b: 0,
            op: "+",
            answer: 0,
            waitingForAnswer: true,
        };

        function randomIntBetween(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function mathNumberNode(number) {
            if (number < 0) {
                return `<mrow><mo>−</mo><mn>${Math.abs(number)}</mn></mrow>`;
            }
            return `<mn>${number}</mn>`;
        }

        function createQuestion() {
            state.a = randomIntBetween(-10, 10);
            state.b = randomIntBetween(-10, 10);
            state.op = Math.random() < 0.5 ? "+" : "*";
            state.answer = state.op === "+" ? state.a + state.b : state.a * state.b;
            state.waitingForAnswer = true;
        }

        function renderQuestion() {
            const questionElement = document.getElementById("question");
            const opNode = state.op === "+" ? "+" : "⋅";

            questionElement.innerHTML = `
                <math display="block">
                    <mrow>
                        ${mathNumberNode(state.a)}
                        <mo>${opNode}</mo>
                        ${mathNumberNode(state.b)}
                    </mrow>
                </math>
            `;
        }

        function resetUiForQuestion() {
            const answerInput = document.getElementById("answer");
            const status = document.getElementById("status");
            const actionButton = document.getElementById("actionButton");

            answerInput.value = "";
            answerInput.readOnly = false;
            answerInput.focus();

            status.className = "alert status alert-secondary";
            status.textContent = "Antwort eingeben und Prüfen drücken.";
            actionButton.textContent = "Prüfen";
            actionButton.className = "btn btn-primary btn-lg w-100 action-btn";
        }

        function evaluateAnswer() {
            const answerInput = document.getElementById("answer");
            const status = document.getElementById("status");
            const actionButton = document.getElementById("actionButton");
            const userValue = Number(answerInput.value.trim());
            const isCorrect = Number.isFinite(userValue) && userValue === state.answer;

            if (isCorrect) {
                status.className = "alert status alert-success";
                status.textContent = `Richtig! Ergebnis: ${state.answer}. Nächste Aufgabe drücken.`;
            } else {
                status.className = "alert status alert-danger";
                status.textContent = `Falsch. Richtig wäre: ${state.answer}. Nächste Aufgabe drücken.`;
                if ("vibrate" in navigator) {
                    navigator.vibrate(120);
                }
            }

            answerInput.readOnly = true;
            answerInput.blur();
            actionButton.textContent = "Nächste Aufgabe";
            actionButton.className = "btn btn-success btn-lg w-100 action-btn";
            state.waitingForAnswer = false;
        }

        function nextQuestion() {
            createQuestion();
            renderQuestion();
            resetUiForQuestion();
        }

        function handleAction() {
            if (state.waitingForAnswer) {
                evaluateAnswer();
            } else {
                nextQuestion();
            }
        }

        function onFormSubmit(event) {
            event.preventDefault();
            handleAction();
        }

        function main() {
            const form = document.getElementById("trainerForm");

            form.addEventListener("submit", onFormSubmit);
            nextQuestion();
        }

        document.addEventListener("DOMContentLoaded", main);
    </script>

</head>
<body class="px-3">
    <main class="container py-4">
        <div class="card trainer-card shadow-lg mx-auto">
            <div class="card-body p-4 p-md-5">
                <h1 class="h2 text-center mb-2">Mathe Training</h1>

                <div class="question-wrap mb-4">
                    <div id="question" aria-live="polite"></div>
                </div>

                <form id="trainerForm" novalidate>
                    <label for="answer" class="form-label fw-semibold">Deine Antwort</label>
                    <input
                        id="answer"
                        class="form-control form-control-lg mb-3"
                        type="number"
                        step="1"
                        inputmode="numeric"
                        autocomplete="off"
                        aria-label="Antwort"
                    />

                    <button id="actionButton" type="submit" class="btn btn-primary btn-lg w-100 action-btn mb-3">
                        Prüfen
                    </button>
                </form>

                <div id="status" class="alert status alert-secondary" role="status" aria-live="polite">
                    Antwort eingeben und Prüfen drücken.
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
