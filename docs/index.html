<!DOCTYPE html>
<html>
<head>
    <title>Mathe Training</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #f8f9fa 0%, #e9ecef 100%);
            display: grid;
            place-items: center;
        }

        .trainer-card {
            max-width: 540px;
            width: 100%;
            border: 0;
            border-radius: 1rem;
        }

        .question-wrap {
            min-height: 84px;
            display: grid;
            place-items: center;
            background-color: #f8f9fa;
            border-radius: 0.75rem;
            border: 1px solid #dee2e6;
        }

        .question-wrap.is-correct {
            background-color: var(--bs-success-bg-subtle);
            border-color: var(--bs-success-border-subtle);
        }

        .question-wrap.is-wrong {
            background-color: var(--bs-danger-bg-subtle);
            border-color: var(--bs-danger-border-subtle);
        }

        .question-wrap math {
            font-size: clamp(1.9rem, 8vw, 2.4rem);
        }

        .action-btn {
            min-height: 52px;
            font-weight: 600;
        }

        @media (max-width: 576px) {
            body {
                min-height: 100dvh;
                display: block;
            }

            main.container {
                padding-top: 0.75rem !important;
                padding-bottom: 0.75rem !important;
            }

            .card-body {
                padding: 1.25rem !important;
            }

        }
    </style>
    <script>
        const state = {
            currentProblem: null,
            waitingForAnswer: true,
        };

        function randomIntBetween(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function mathNumberNode(number) {
            if (number < 0) {
                return `<mrow><mo>−</mo><mn>${Math.abs(number)}</mn></mrow>`;
            }
            return `<mn>${number}</mn>`;
        }

        class SumProblem {
            constructor() {
                this.a = randomIntBetween(-30, 30);
                this.b = randomIntBetween(-30, 30);
            }

            renderExpression() {
                return `
                    ${mathNumberNode(this.a)}
                    ${this.b >= 0 ? '<mo>+</mo>' : ''}
                    ${mathNumberNode(this.b)}
                `;
            }

            renderMathML() {
                return `<math display="block"><mrow>${this.renderExpression()}</mrow></math>`;
            }

            evaluate() {
                return this.a + this.b;
            }
        }

        class ProductProblem {
            constructor() {
                this.a = randomIntBetween(-10, 10);
                this.b = randomIntBetween(-10, 10);
            }

            renderExpression() {
                return `
                    ${mathNumberNode(this.a)}
                    <mo>⋅</mo>
                    ${mathNumberNode(this.b)}
                `;
            }

            renderMathML() {
                return `<math display="block"><mrow>${this.renderExpression()}</mrow></math>`;
            }

            evaluate() {
                return this.a * this.b;
            }
        }

        function createQuestion() {
            const ProblemTypes = [SumProblem, ProductProblem];
            const ProblemType = ProblemTypes[Math.floor(Math.random() * ProblemTypes.length)];

            state.currentProblem = new ProblemType();
            state.waitingForAnswer = true;
        }

        function renderQuestion() {
            const questionElement = document.getElementById("question");
            questionElement.innerHTML = state.currentProblem.renderMathML();
        }

        function resetUiForQuestion() {
            const answerInput = document.getElementById("answer");
            const actionButton = document.getElementById("actionButton");
            const questionWrap = document.getElementById("questionWrap");

            answerInput.value = "";
            answerInput.focus();

            questionWrap.classList.remove("is-correct", "is-wrong");
            actionButton.textContent = "Prüfen";
            actionButton.className = "btn btn-primary btn-lg w-100 action-btn";
        }

        function evaluateAnswer() {
            const answerInput = document.getElementById("answer");
            const actionButton = document.getElementById("actionButton");
            const questionElement = document.getElementById("question");
            const questionWrap = document.getElementById("questionWrap");
            const userValue = Number(answerInput.value.trim());
            const correctResult = state.currentProblem.evaluate();
            const isCorrect = Number.isFinite(userValue) && userValue === correctResult;
            const expression = state.currentProblem.renderExpression();

            if (isCorrect) {
                questionWrap.classList.remove("is-wrong");
                questionWrap.classList.add("is-correct");
                questionElement.innerHTML = `
                    <math display="block">
                        <mrow>
                            ${expression}
                            <mo>=</mo>
                            ${mathNumberNode(correctResult)}
                        </mrow>
                    </math>
                `;
            } else {
                questionWrap.classList.remove("is-correct");
                questionWrap.classList.add("is-wrong");
                questionElement.innerHTML = `
                    <math display="block">
                        <mrow>
                            ${expression}
                            <mo>=</mo>
                            ${mathNumberNode(userValue)}
                            <mo>≠</mo>
                            ${mathNumberNode(correctResult)}
                        </mrow>
                    </math>
                `;
            }
            answerInput.value = "";
            actionButton.textContent = "Nächste Aufgabe";
            actionButton.className = "btn btn-success btn-lg w-100 action-btn";
            state.waitingForAnswer = false;
        }

        function nextQuestion() {
            createQuestion();
            renderQuestion();
            resetUiForQuestion();
        }

        function keepCardVisible() {
            if (window.innerWidth > 576) {
                return;
            }

            const card = document.querySelector(".trainer-card");
            if (card) {
                card.scrollIntoView({ block: "start", behavior: "smooth" });
            }
        }

        function handleAction() {
            if (state.waitingForAnswer) {
                evaluateAnswer();
            } else {
                nextQuestion();
            }
        }

        function onFormSubmit(event) {
            event.preventDefault();
            handleAction();
        }

        function main() {
            const form = document.getElementById("trainerForm");
            const answerInput = document.getElementById("answer");

            form.addEventListener("submit", onFormSubmit);
            answerInput.addEventListener("focus", () => {
                setTimeout(keepCardVisible, 220);
            });

            if (window.visualViewport) {
                window.visualViewport.addEventListener("resize", keepCardVisible);
            }

            nextQuestion();
        }

        document.addEventListener("DOMContentLoaded", main);
    </script>

</head>
<body class="px-3">
    <main class="container py-4">
        <div class="card trainer-card shadow-lg mx-auto">
            <div class="card-body p-4 p-md-5">
                <h1 class="h2 text-center mb-2">Mathe Training</h1>

                <div id="questionWrap" class="question-wrap mb-4">
                    <div id="question" aria-live="polite"></div>
                </div>

                <form id="trainerForm" novalidate>
                    <label for="answer" class="form-label fw-semibold">Deine Antwort</label>
                    <input
                        id="answer"
                        class="form-control form-control-lg mb-3"
                        type="number"
                        step="1"
                        inputmode="numeric"
                        autocomplete="off"
                        aria-label="Antwort"
                    />

                    <button id="actionButton" type="submit" class="btn btn-primary btn-lg w-100 action-btn mb-3">
                        Prüfen
                    </button>
                </form>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
